# oh-my-agent — project config
# Full schema: web/docs/guide/per-agent-models.md

# ─────────────────────────────────────────────────────────────────────────────
# Global preferences
# ─────────────────────────────────────────────────────────────────────────────

# Response language (ko, en, ja, zh, ...)
language: en

# Translation voice preference for oma-translator skill.
#   formal      — technical writer / reporter style, complete sentences, no fragments,
#                 strict 합니다체 / です・ます (best for legal, official docs)
#   balanced    — content-type-based persona routing (default)
#   interpreter — interpreter mindset across all content types: punchy, audience-first,
#                 spoken cadence, fragments allowed when natural, drops formal padding
# Affects persona resolution in `.agents/skills/oma-translator/SKILL.md` Stage 2.5.
translation_voice: balanced

# Date / time
date_format: ISO
timezone: Asia/Seoul

# Auto-update the oh-my-agent CLI in the background when outdated.
# Disable per-shell with OMA_SKIP_VERSION_CHECK=1.
auto_update_cli: true

# Vendor telemetry opt-in. Applied at `oma install` / `oma update` / `oma doctor`.
#   false (default) — oh-my-agent writes the following opt-outs:
#       • Claude : env.DISABLE_TELEMETRY = "1" in .claude/settings.json
#                  (note: this also disables Claude Code Remote Control
#                  v2.1.51+, since the RC eligibility check fails when
#                  DISABLE_TELEMETRY is set)
#       • Gemini : privacy.usageStatisticsEnabled = false in .gemini/settings.json
#       • Qwen   : privacy.usageStatisticsEnabled = false in .qwen/settings.json
#       • Codex  : analytics.enabled = false, feedback.enabled = false in
#                  .codex/config.toml
#   true            — the keys above are stripped on next install/update so each
#                     vendor's default telemetry path runs (and Claude Code
#                     Remote Control becomes eligible).
telemetry: false

# ─────────────────────────────────────────────────────────────────────────────
# Serena MCP transport
# ─────────────────────────────────────────────────────────────────────────────
#
# Each vendor's serena MCP entry is regenerated by `oma link`. Default is
# stdio — every vendor spawns its own `serena start-mcp-server` process with
# a vendor-appropriate `--context` (claude-code, codex, ide).
#
# Opt in to bridge mode when one vendor can't speak stdio (Antigravity IDE)
# or when you want a single shared serena process across vendors. The
# `bridge_host` vendor receives `{url: bridge_url}` in its MCP config instead
# of stdio; you must run `oma bridge` separately so the HTTP server is up.
#
# `auto_update` is opt-in (default false). When true, `oma update` runs
# `uv tool upgrade serena-agent --prerelease=allow` after vendor reconcile.
# Failures (uv missing, network) are warned-only — the previously installed
# serena keeps working.
#
# serena:
#   mode: bridge
#   bridge_host: claude             # the CLI that connects via URL
#   bridge_url: http://localhost:12341/mcp  # default; override if needed
#   auto_update: true               # upgrade serena-agent on every `oma update`

# ─────────────────────────────────────────────────────────────────────────────
# oma-docs documentation drift detection
# ─────────────────────────────────────────────────────────────────────────────

docs:
  # When true, runs `oma docs verify --json` at the end of /scm, /work, /ultrawork.
  # Warn-only — never blocks workflow completion. Default: false (opt-in).
  # See `.agents/skills/oma-docs/SKILL.md` for full behavior.
  auto_verify: false

  # When true (default), URL link checking is delegated to `lychee` running
  # in the background; results land in docs/generated/url-drift.json.
  # If `lychee` is missing, `oma docs verify` prints an install hint and
  # skips URL checking. Set to false to silence that hint and disable URL
  # checks entirely (e.g., when you run lychee separately from CI).
  # Install: `brew install lychee` (macOS) or see
  # https://github.com/lycheeverse/lychee#installation for other platforms.
  check_urls: true

# ─────────────────────────────────────────────────────────────────────────────
# Session quota caps (orchestrate / agent:spawn token & spawn budget)
# ─────────────────────────────────────────────────────────────────────────────
#
# When set, `oma agent:spawn` records token usage per agent and blocks the
# next spawn once any cap is exceeded. Records persist to
# .serena/memories/session-cost-{sessionId}.md. Omit to disable.
#
# All keys optional. Omitting a key leaves that dimension uncapped.
# Schema source: cli/io/session-cost.ts (loadQuotaCap / normalizeQuotaCap).
#
# session:
#   quota_cap:
#     tokens: 2000000          # total token budget across all vendors
#     spawn_count: 30          # max agent spawns per session
#     per_vendor:              # per-vendor token budgets
#       claude: 1500000
#       codex: 500000

# ─────────────────────────────────────────────────────────────────────────────
# Model selection
# ─────────────────────────────────────────────────────────────────────────────

# Built-in: antigravity | claude | codex | qwen | cursor | mixed
# (custom_presets entries are also valid)
model_preset: claude

# Per-agent override (optional) — shallow-merged on top of the preset entry.
# Agent ids: orchestrator, architecture, qa, pm, backend, frontend, mobile,
#            db, debug, docs, tf-infra, retrieval
# Each AgentSpec accepts:
#   model:    "<owner>/<slug>"  required.  Slugs follow OpenRouter convention
#             (https://openrouter.ai/models). Only models whose owning vendor
#             ships a forkable CLI (antigravity, claude, codex, qwen) are usable —
#             API-only entries (api_only: true) are skipped. Custom slugs go
#             in `models:` below.
#   effort:   none | low | medium | high | xhigh   (ignored for cli-session models like Claude)
#   thinking: true | false                          (vendor-dependent)
#   memory:   user | project | local                (per-agent memory tier)
# Example:
# agents:
#   backend:
#     model: openai/gpt-5.5
#     effort: high
#   qa:
#     model: anthropic/claude-sonnet-4-6

# Inline custom model slugs (optional; replaces the legacy models.yaml file).
# Example:
# models:
#   my-fast:
#     cli: antigravity
#     cli_model: gemini-3.5-flash
#     supports:
#       native_dispatch_from: [antigravity]

# User-defined presets (optional). Use `extends:` to partially inherit a built-in.
# Example:
# custom_presets:
#   my-team:
#     extends: claude
#     description: "Team A — sonnet base, codex backend"
#     agent_defaults:
#       backend: { model: openai/gpt-5.5, effort: high }

# ─────────────────────────────────────────────────────────────────────────────
# Resolution order (when an agent runs):
#   1. agents.<id>            — explicit per-agent override
#   2. model_preset entry     — built-in or custom_presets[model_preset]
#   3. preset.orchestrator    — fallback when an agent is missing from the preset
# ─────────────────────────────────────────────────────────────────────────────
vendors:
  - claude
  - codex
  - copilot
  - cursor
  - gemini
  - qwen
