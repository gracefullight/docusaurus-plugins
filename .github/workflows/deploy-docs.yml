name: Node CI

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    env:
      GIT_USER: github-actions[bot]
      GIT_PASS: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - name: SETUP_NODE_${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - name: BEFORE_SCRIPT
        run: |
          # Configure git identity globally so commits in temp gh-pages clone succeed
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: INSTALL_PACKAGES
        run: bun install --frozen-lockfile
      - name: BUILD_PACKAGES
        run: bunx turbo run build --filter=@gracefullight/docusaurus-plugin-docs...
      - name: DEPLOY
        run: bun run --filter "@gracefullight/docusaurus-plugin-docs" deploy
